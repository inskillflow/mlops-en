services:

  mlflow:
    build:
      context: ./mlflow
    image: mlops/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow/database
      - mlflow-artifacts:/mlflow/mlruns
    networks:
      - mlops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;urllib.request.urlopen('http://localhost:5000/').read();"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./fastapi
    image: mlops/fastapi:latest
    container_name: fastapi
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net
    restart: unless-stopped

  streamlit:
    build:
      context: ./streamlit
    image: mlops/streamlit:latest
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://fastapi:8000"
    depends_on:
      - fastapi
    networks:
      - mlops-net
    restart: unless-stopped

volumes:
  mlflow-db:
  mlflow-artifacts:

networks:
  mlops-net:
    driver: bridge
